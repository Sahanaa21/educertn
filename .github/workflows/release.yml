name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate Before Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend install and typecheck
        run: |
          cd backend
          npm ci --no-fund --no-audit
          npm run typecheck

      - name: Frontend install, lint, and build
        run: |
          cd frontend
          npm ci --no-fund --no-audit
          npm run lint
          npm run build

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create source archive
        shell: bash
        run: |
          git archive --format=zip --output educert-${{ steps.tag.outputs.tag }}.zip HEAD

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            educert-${{ steps.tag.outputs.tag }}.zip
