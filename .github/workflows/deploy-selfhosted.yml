name: Deploy Self-Hosted

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to College Server
    runs-on: ubuntu-latest
    if: vars.DEPLOY_ENABLED == 'true' && (github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'))
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    steps:
      - name: Validate deploy configuration
        shell: bash
        run: |
          set -e
          test -n "$DEPLOY_HOST" || (echo "DEPLOY_HOST is missing" && exit 1)
          test -n "$DEPLOY_USER" || (echo "DEPLOY_USER is missing" && exit 1)
          test -n "$DEPLOY_SSH_KEY" || (echo "DEPLOY_SSH_KEY is missing" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "DEPLOY_PATH is missing" && exit 1)

      - name: Remote deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "$DEPLOY_PATH"

            git fetch origin
            git checkout main
            git pull --ff-only origin main

            cd backend
            npm ci --no-fund --no-audit
            npm run build
            cd ..

            cd frontend
            npm ci --no-fund --no-audit
            npm run build
            cd ..

            pm2 restart backend || pm2 start backend/ecosystem.config.js
            pm2 restart frontend || pm2 start npm --name frontend --cwd frontend -- start
            pm2 save
