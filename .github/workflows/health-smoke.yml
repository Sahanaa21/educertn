name: Health Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  smoke:
    name: API Health Smoke
    runs-on: ubuntu-latest
    if: ${{ secrets.HEALTH_BASE_URL != '' || vars.HEALTH_BASE_URL != '' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Run health smoke
        env:
          HEALTH_BASE_URL: ${{ secrets.HEALTH_BASE_URL || vars.HEALTH_BASE_URL }}
          HEALTH_TIMEOUT_MS: "8000"
        run: npm run ops:health-smoke
